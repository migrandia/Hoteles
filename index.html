<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospedaje | Boda Lucía & Alejandro</title>

    <script>
        /* ==========================================
           1. ENLACES Y DATOS - EDITA AQUÍ
           ========================================== */
        const DATOS_HOTEL = {
            nombre: "Hotel St. Regis Luxury",
            foto_hero: "https://www.dropbox.com/scl/fi/snutqjlkrv7oglqswicq2/novios-besandoce.jpg?rlkey=ad7z44z08wgr0f4wcd20et7nz&raw=1",
            direccion: "Av. Paseo de la Reforma 439, Cuauhtémoc, CDMX.",
            codigo_descuento: "BODA L&A 2026",
            fecha_limite: "15 de Octubre de 2026",
            telefono: "+525512345678",
            link_reserva_web: "https://www.marriott.com",
            iframe_mapa: "https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3762.539574245657!2d-99.1732608240212!3d19.43224094034872!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x85d1ff35f5bd1563%3A0x6ad45191a7878fa8!2sThe%20St.%20Regis%20Mexico%20City!5e0!3m2!1ses-419!2smx!4v1710000000000!5m2!1ses-419!2smx"
        };

        /* ==========================================
           2. COLORES - EDITA AQUÍ
           ========================================== */
        const COLORES = {
            dorado: "#d4b483",
            fondo_suave: "#fcfaf8",
            texto_oscuro: "#2d2d2d",
            blanco: "#ffffff"
        };
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,400&family=Montserrat:wght@200;400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --oro: #d4b483; --fondo: #fcfaf8; --texto: #2d2d2d; --blanco: #ffffff;
        }

        body { margin: 0; padding: 0; background-color: #1a1a1a; color: var(--texto); font-family: 'Montserrat', sans-serif; text-align: center; }

        .hotel-wrapper {
            max-width: 480px; margin: 0 auto; background-color: var(--fondo);
            min-height: 100vh; position: relative; box-shadow: 0 0 40px rgba(0,0,0,0.5);
        }

        .hotel-hero {
            height: 300px; background-position: center !important; background-size: cover !important;
            display: flex; align-items: center; justify-content: center; position: relative;
        }
        .hotel-hero::before { content: ""; position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.3); }

        h1 { font-family: 'Cormorant Garamond', serif; color: white; font-size: 2.5rem; letter-spacing: 3px; position: relative; z-index: 1; }

        section { padding: 40px 20px; }

        .hotel-card {
            background: var(--blanco); border-radius: 12px; padding: 30px 20px;
            border: 1px solid #f2ede4; margin-top: -50px; position: relative;
            z-index: 2; width: 85%; margin-left: auto; margin-right: auto;
        }

        .hotel-name { font-family: 'Cormorant Garamond', serif; font-size: 1.8rem; margin: 10px 0; color: var(--oro); }

        .detalles { font-size: 0.9rem; line-height: 1.8; color: #555; text-align: left; margin: 20px 0; }

        .btn-action {
            display: block; background: var(--texto); color: white;
            padding: 18px; border-radius: 8px; text-decoration: none;
            font-weight: bold; font-size: 0.8rem; letter-spacing: 2px; margin-top: 15px;
            transition: 0.3s;
        }

        .btn-call { background: var(--oro); }

        .map-box { width: 100%; height: 250px; background: #eee; border-radius: 8px; margin-top: 20px; overflow: hidden; }
        iframe { width: 100%; height: 100%; border: none; }

        .footer-back { margin-top: 40px; padding-bottom: 60px; }
        .back-link { 
            color: var(--oro); text-decoration: none; font-size: 0.7rem; 
            letter-spacing: 2px; font-weight: bold; cursor: pointer; 
            border: 1px solid var(--oro); padding: 10px 20px; border-radius: 30px;
            background: none; transition: 0.3s;
        }
        .back-link:hover { background: var(--oro); color: white; }
    </style>
</head>
<body>

    <div class="hotel-wrapper">
        <div id="hero-img" class="hotel-hero">
            <h1>Hospedaje</h1>
        </div>

        <section>
            <div class="hotel-card">
                <p style="font-size: 0.7rem; letter-spacing: 3px; color: var(--oro); font-weight: bold;">HOTEL SEDE</p>
                <h2 id="hotel-name" class="hotel-name"></h2>
                
                <div class="detalles">
                    <p><strong>📍 Ubicación:</strong> <span id="txt-dir"></span></p>
                    <p><strong>🔑 Código:</strong> <span id="txt-cod"></span></p>
                    <p><strong>📅 Límite:</strong> <span id="txt-lim"></span></p>
                </div>

                <a id="link-tel" href="#" class="btn-action btn-call">LLAMAR PARA RESERVAR</a>
                <a id="link-web" href="#" target="_blank" class="btn-action">RESERVAR EN LÍNEA</a>
            </div>
        </section>

        <section>
            <h3 style="font-family: 'Cormorant Garamond'; font-size: 1.5rem;">Ubicación</h3>
            <div class="map-box">
                <iframe id="mapa-frame" src="" allowfullscreen="" loading="lazy"></iframe>
            </div>
        </section>

        <div class="footer-back">
            <button onclick="irAtras()" class="back-link">← VOLVER A LA INVITACIÓN</button>
        </div>
    </div>

    <script>
        // Cargar Datos
        document.getElementById('hero-img').style.background = `url('${DATOS_HOTEL.foto_hero}')`;
        document.getElementById('hotel-name').innerText = DATOS_HOTEL.nombre;
        document.getElementById('txt-dir').innerText = DATOS_HOTEL.direccion;
        document.getElementById('txt-cod').innerText = DATOS_HOTEL.codigo_descuento;
        document.getElementById('txt-lim').innerText = DATOS_HOTEL.fecha_limite;
        document.getElementById('link-tel').href = `tel:${DATOS_HOTEL.telefono}`;
        document.getElementById('link-web').href = DATOS_HOTEL.link_reserva_web;
        document.getElementById('mapa-frame').src = DATOS_HOTEL.iframe_mapa;

        // Cargar Colores
        const r = document.documentElement.style;
        r.setProperty('--oro', COLORES.dorado);
        r.setProperty('--fondo', COLORES.fondo_suave);
        r.setProperty('--texto', COLORES.texto_oscuro);
        r.setProperty('--blanco', COLORES.blanco);

        function irAtras() {
            // CRITICAL: Le dice a la otra página que no muestre el sobre
            sessionStorage.setItem('sobreAbierto', 'true');
            
            // Forzamos el regreso
            if (document.referrer.indexOf(window.location.host) !== -1) {
                window.history.back();
            } else {
                // Si se pierde, lo mandamos a la invitación directamente
                window.location.href = "index.html"; 
            }
        }
    </script>
</body>
</html>
