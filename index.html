<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospedaje | Boda Lucía & Alejandro</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,400&family=Montserrat:wght@200;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --oro: #d4b483;
            --fondo: #fcfaf8;
            --texto: #2d2d2d;
            --blanco: #ffffff;
            --ancho: 480px;
        }

        body { margin: 0; padding: 0; background-color: #1a1a1a; color: var(--texto); font-family: 'Montserrat', sans-serif; text-align: center; }

        .hotel-wrapper {
            max-width: var(--ancho);
            margin: 0 auto;
            background-color: var(--fondo);
            min-height: 100vh;
            position: relative;
            box-shadow: 0 0 40px rgba(0,0,0,0.5);
        }

        .hotel-hero {
            height: 300px;
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), 
                        url('https://www.dropbox.com/scl/fi/snutqjlkrv7oglqswicq2/novios-besandoce.jpg?rlkey=ad7z44z08wgr0f4wcd20et7nz&raw=1') center center;
            background-size: cover;
            display: flex; align-items: center; justify-content: center;
        }

        h1 { font-family: 'Cormorant Garamond', serif; color: white; font-size: 2.5rem; letter-spacing: 3px; }

        section { padding: 40px 20px; }

        .hotel-card {
            background: var(--blanco);
            border-radius: 12px;
            padding: 30px 20px;
            border: 1px solid #f2ede4;
            margin-top: -50px;
            position: relative;
            z-index: 2;
            width: 85%;
            margin-left: auto; margin-right: auto;
        }

        .hotel-name { font-family: 'Cormorant Garamond', serif; font-size: 1.8rem; margin: 10px 0; color: var(--oro); }

        .detalles { font-size: 0.9rem; line-height: 1.8; color: #555; text-align: left; margin: 20px 0; }

        .btn-action {
            display: block; background: var(--texto); color: white;
            padding: 18px; border-radius: 8px; text-decoration: none;
            font-weight: bold; font-size: 0.8rem; letter-spacing: 2px; margin-top: 15px;
            transition: 0.3s;
        }

        .btn-call { background: var(--oro); }

        .map-box {
            width: 100%; height: 250px; background: #eee; border-radius: 8px;
            margin-top: 20px; overflow: hidden;
        }

        iframe { width: 100%; height: 100%; border: none; }

        .footer-back { margin-top: 40px; padding-bottom: 40px; }
        .back-link { color: var(--oro); text-decoration: none; font-size: 0.7rem; letter-spacing: 2px; font-weight: bold; cursor: pointer; border: none; background: none; }
    </style>
</head>
<body>

    <div class="hotel-wrapper">
        <div class="hotel-hero">
            <h1>Hospedaje</h1>
        </div>

        <section>
            <div class="hotel-card">
                <p style="font-size: 0.7rem; letter-spacing: 3px; color: var(--oro); font-weight: bold;">HOTEL SEDE</p>
                <h2 class="hotel-name">Hotel St. Regis Luxury</h2>
                
                <div class="detalles">
                    <p><strong>📍 Ubicación:</strong> Av. Paseo de la Reforma 439, Cuauhtémoc, CDMX.</p>
                    <p><strong>🔑 Código de Descuento:</strong> BODA L&A 2026</p>
                    <p><strong>📅 Fecha Límite:</strong> Reservar antes del 15 de Febrero.</p>
                </div>

                <a href="tel:+525512345678" class="btn-action btn-call">LLAMAR PARA RESERVAR</a>
                <a href="https://www.marriott.com" target="_blank" class="btn-action">RESERVAR EN LÍNEA</a>
            </div>
        </section>

        <section>
            <h3 style="font-family: 'Cormorant Garamond'; font-size: 1.5rem;">Ubicación</h3>
            <div class="map-box">
                <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3762.539574163013!2d-99.17367832386377!3d19.432247040333276!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x85d1ff35f5bd1563%3A0x6ad451ffc4a05244!2sThe%20St.%20Regis%20Mexico%20City!5e0!3m2!1ses-419!2smx!4v1700000000000!5m2!1ses-419!2smx" allowfullscreen="" loading="lazy"></iframe>
            </div>
        </section>

        <div class="footer-back">
            <button onclick="irAtras()" class="back-link">← VOLVER A LA INVITACIÓN</button>
        </div>
    </div>

    <script>
        function irAtras() {
            // Le avisamos a la invitación que ya abrimos el sobre
            sessionStorage.setItem('sobreAbierto', 'true');
            
            // Intentamos regresar. Si el historial falla, lo mandamos a la página anterior manualmente
            if (window.history.length > 1) {
                window.history.back();
            } else {
                // Si no hay historial, intenta cerrar la pestaña o regresar a la URL anterior detectada
                window.location.href = document.referrer;
            }
        }
    </script>

</body>
</html>
